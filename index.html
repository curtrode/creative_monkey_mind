<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey Mind</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #888;
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
  }

  .header {
    padding: 16px 24px 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .prompt {
    color: #555;
  }

  .prompt .cmd { color: #888; }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #555;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .controls {
    display: flex;
    gap: 12px;
  }

  .controls a {
    color: #444;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
    user-select: none;
  }

  .controls a:hover { color: #999; }
  .controls a.active { color: #777; }

  .stage {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    height: calc(100vh - 48px);
  }

  .divider {
    background: #1a1a1a;
  }

  .panel {
    position: relative;
    overflow: hidden;
  }

  .panel iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    cursor: pointer;
  }

  .overlay-prompt {
    color: #444;
    font-size: 15px;
  }

  .overlay-prompt .text { color: #666; }
  .overlay:hover .overlay-prompt .text { color: #999; }

  .overlay input {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 12px;
    width: 320px;
    border: 1px solid #333;
    border-radius: 0;
    background: #111;
    color: #888;
    text-align: center;
  }

  .overlay input::placeholder { color: #444; }
  .overlay input:focus { outline: 1px solid #555; border-color: #555; }

  .overlay .hint {
    font-size: 11px;
    color: #444;
  }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-prompt">
    <span class="text">&gt; press to begin</span><span class="cursor"></span>
  </div>
  <input id="api-key" type="password" placeholder="OpenAI API key (optional)">
  <div class="hint">leave blank for machine voices, or enter key for human-like AI voices</div>
  <div class="hint" id="key-status"></div>
</div>

<div class="header">
  <div class="prompt">
    <span class="cmd">&gt; monkey_mind</span><span class="cursor"></span>
  </div>
  <div class="controls">
    <a id="him-btn" class="active">[him:on]</a>
    <a id="him-speed">[3500ms]</a>
    <a id="her-btn" class="active">[her:on]</a>
    <a id="her-speed">[2000ms]</a>
    <a id="mute-btn">[mute]</a>
    <a id="voice-btn" style="display:none">[voice:machine]</a>
  </div>
</div>

<div class="stage">
  <div class="panel him">
    <iframe id="him" src="stochastic_thing2.html"></iframe>
  </div>
  <div class="divider"></div>
  <div class="panel her">
    <iframe id="her" src="stochastic_thing3.html"></iframe>
  </div>
</div>

<script>
  var listening = false;
  var storedApiKey = localStorage.getItem('mm_apikey') || null;
  var useAI = false;
  var hearEnabled = { him: true, her: true };
  var overlay = document.getElementById('overlay');
  var muteBtn = document.getElementById('mute-btn');
  var voiceBtn = document.getElementById('voice-btn');
  var himBtn = document.getElementById('him-btn');
  var herBtn = document.getElementById('her-btn');
  var apiKeyInput = document.getElementById('api-key');

  var aiVoices = { him: 'onyx', her: 'nova' };

  // Web Audio API for stereo panning (AI voices only)
  var audioCtx = null;
  var panners = { him: null, her: null };
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      panners.him = audioCtx.createStereoPanner();
      panners.him.pan.value = -0.8;
      panners.him.connect(audioCtx.destination);
      panners.her = audioCtx.createStereoPanner();
      panners.her.pan.value = 0.8;
      panners.her.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  var browserVoices = {
    him: { rate: 0.35, pitch: 0.3, voiceName: 'Daniel' },
    her: { rate: 0.375, pitch: 1.2, voiceName: 'Samantha' }
  };

  var cachedVoices = [];
  function loadVoices() { cachedVoices = speechSynthesis.getVoices(); }
  loadVoices();
  if (speechSynthesis.addEventListener) {
    speechSynthesis.addEventListener('voiceschanged', loadVoices);
  }

  var pendingUtterances = 0;
  function speakBrowser(text, settings) {
    if (pendingUtterances >= 2) return;
    var utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = settings.rate;
    utterance.pitch = settings.pitch;
    if (settings.voiceName && cachedVoices.length) {
      var match = cachedVoices.find(function (v) { return v.name.includes(settings.voiceName); });
      if (match) utterance.voice = match;
    }
    pendingUtterances++;
    utterance.onend = function () { pendingUtterances--; };
    utterance.onerror = function () { pendingUtterances--; };
    speechSynthesis.speak(utterance);
  }

  function speakAI(text, voice, source) {
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();

    fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + storedApiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'tts-1',
        input: text,
        voice: voice,
        speed: 0.9
      })
    })
    .then(function (res) {
      if (!res.ok) {
        return res.text().then(function (body) {
          throw new Error('TTS ' + res.status + ': ' + body);
        });
      }
      return res.arrayBuffer();
    })
    .then(function (buf) {
      return ctx.decodeAudioData(buf);
    })
    .then(function (decoded) {
      var src = ctx.createBufferSource();
      src.buffer = decoded;
      var panner = panners[source] || panners.him;
      src.connect(panner);
      src.start();
    })
    .catch(function (err) {
      console.error('AI speech error:', err.message);
      speakBrowser(text, browserVoices[source] || browserVoices.him);
      var existing = document.getElementById('tts-error');
      if (existing) existing.remove();
      var errDiv = document.createElement('div');
      errDiv.id = 'tts-error';
      errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#a00;color:#fff;padding:8px;font-family:inherit;font-size:12px;z-index:200;cursor:pointer;';
      errDiv.textContent = 'tts error (click to dismiss): ' + err.message;
      errDiv.addEventListener('click', function () { errDiv.remove(); });
      document.body.appendChild(errDiv);
      speakAI.failures = (speakAI.failures || 0) + 1;
      if (speakAI.failures >= 3) {
        useAI = false;
        voiceBtn.textContent = '[voice:machine]';
        errDiv.textContent = 'ai tts failed — switched to machine voices. click toggle to retry.';
      }
    });
  }

  function speak(text, source) {
    if (!listening) return;
    if (!hearEnabled[source]) return;
    var clean = text.replace(/\(/g, ', ...... , ').replace(/\)/g, ' , ...... , ').replace(/\s+/g, ' ').trim();
    if (!clean) return;

    if (useAI && storedApiKey) {
      speakAI(clean, aiVoices[source] || 'onyx', source);
    } else {
      speakBrowser(clean, browserVoices[source] || browserVoices.him);
    }
  }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'monkeyMindText') return;
    speak(e.data.text, e.data.source);
  });

  // Prevent click on input from triggering overlay dismiss
  apiKeyInput.addEventListener('click', function (e) {
    e.stopPropagation();
  });

  if (storedApiKey) {
    apiKeyInput.value = storedApiKey;
    document.getElementById('key-status').textContent = 'saved key found';
  }

  overlay.addEventListener('click', function () {
    var inputKey = apiKeyInput.value.trim();
    if (inputKey) {
      storedApiKey = inputKey;
      localStorage.setItem('mm_apikey', inputKey);
    } else {
      storedApiKey = null;
      localStorage.removeItem('mm_apikey');
    }
    overlay.remove();
    listening = false;
    muteBtn.textContent = '[mute]';
    if (storedApiKey) {
      voiceBtn.style.display = '';
    }
  });

  himBtn.addEventListener('click', function () {
    hearEnabled.him = !hearEnabled.him;
    if (!hearEnabled.him) speechSynthesis.cancel();
    this.textContent = hearEnabled.him ? '[him:on]' : '[him:off]';
    this.classList.toggle('active', hearEnabled.him);
  });

  herBtn.addEventListener('click', function () {
    hearEnabled.her = !hearEnabled.her;
    if (!hearEnabled.her) speechSynthesis.cancel();
    this.textContent = hearEnabled.her ? '[her:on]' : '[her:off]';
    this.classList.toggle('active', hearEnabled.her);
  });

  voiceBtn.addEventListener('click', function () {
    useAI = !useAI;
    speechSynthesis.cancel();
    speakAI.failures = 0;
    var existing = document.getElementById('tts-error');
    if (existing) existing.remove();
    this.textContent = useAI ? '[voice:human]' : '[voice:machine]';
  });

  muteBtn.addEventListener('click', function () {
    listening = !listening;
    if (!listening) speechSynthesis.cancel();
    this.textContent = listening ? '[listening]' : '[mute]';
    this.classList.toggle('active', listening);
  });

  // Speed controls
  var speeds = [1000, 2000, 3500, 5000, 7000];
  var himSpeedIdx = speeds.indexOf(3500);
  var herSpeedIdx = speeds.indexOf(2000);
  var himSpeedBtn = document.getElementById('him-speed');
  var herSpeedBtn = document.getElementById('her-speed');

  himSpeedBtn.addEventListener('click', function () {
    himSpeedIdx = (himSpeedIdx + 1) % speeds.length;
    var ms = speeds[himSpeedIdx];
    this.textContent = '[' + ms + 'ms]';
    document.getElementById('him').contentWindow.postMessage({ type: 'setInterval', interval: ms }, '*');
  });

  herSpeedBtn.addEventListener('click', function () {
    herSpeedIdx = (herSpeedIdx + 1) % speeds.length;
    var ms = speeds[herSpeedIdx];
    this.textContent = '[' + ms + 'ms]';
    document.getElementById('her').contentWindow.postMessage({ type: 'setInterval', interval: ms }, '*');
  });
</script>
</body>
</html>
